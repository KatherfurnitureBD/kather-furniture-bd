<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>কাঠের ফার্নিচার বিডি – সেগুন কাঠের রাজকীয় ফার্নিচার</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --teak:      #8B4513;
      --teak-dark: #5C2E0A;
      --teak-light:#C68642;
      --gold:      #D4A017;
      --gold-light:#F0C040;
      --cream:     #FAF3E8;
      --warm-white:#FFF8F0;
      --charcoal:  #1C1209;
      --gray:      #6B5B45;
      --light-gray:#E8DDD0;
      --hero-bg:   linear-gradient(135deg,#1C0A02 0%,#3B1A06 40%,#5C2E0A 100%);
      --card-shadow: 0 8px 32px rgba(92,46,10,0.18);
    }

    *{margin:0;padding:0;box-sizing:border-box;}
    html{scroll-behavior:smooth;}
    body{font-family:'Hind Siliguri',sans-serif;background:#FAF3E8;color:var(--charcoal);overflow-x:hidden;}

    /* ── ANNOUNCEMENT BAR ── */
    .announce{background:var(--teak-dark);color:var(--gold-light);text-align:center;padding:9px 16px;font-size:.85rem;letter-spacing:.04em;}
    .announce a{color:var(--gold-light);text-decoration:none;font-weight:600;}

    /* ── HEADER ── */
    header{background:#fff;position:sticky;top:0;z-index:1000;box-shadow:0 2px 16px rgba(92,46,10,.12);}
    .header-inner{max-width:1280px;margin:auto;display:flex;align-items:center;gap:16px;padding:12px 24px;flex-wrap:wrap;}
    .logo-wrap{display:flex;align-items:center;gap:12px;text-decoration:none;}
    .logo-icon{width:56px;height:56px;border-radius:50%;background:var(--hero-bg);display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0;border:2px solid var(--gold);}
    .logo-text{display:flex;flex-direction:column;}
    .logo-text .brand{font-family:'Playfair Display',serif;font-size:1.25rem;font-weight:900;color:var(--teak-dark);line-height:1.1;}
    .logo-text .sub{font-size:.72rem;color:var(--gray);letter-spacing:.06em;text-transform:uppercase;}

    nav{flex:1;display:flex;align-items:center;gap:6px;flex-wrap:wrap;justify-content:center;}
    nav a{text-decoration:none;color:var(--charcoal);font-size:.88rem;font-weight:500;padding:7px 13px;border-radius:6px;transition:.2s;}
    nav a:hover{background:var(--cream);color:var(--teak);}

    .header-actions{display:flex;align-items:center;gap:10px;margin-left:auto;}
    .search-box{display:flex;align-items:center;border:1.5px solid var(--light-gray);border-radius:8px;overflow:hidden;background:#fff;}
    .search-box input{border:none;outline:none;padding:8px 12px;font-size:.85rem;font-family:'Hind Siliguri',sans-serif;width:170px;background:transparent;}
    .search-box button{background:var(--teak);border:none;color:#fff;padding:9px 13px;cursor:pointer;font-size:.95rem;transition:.2s;}
    .search-box button:hover{background:var(--teak-dark);}
    .cart-btn{position:relative;background:var(--teak);color:#fff;border:none;padding:9px 16px;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:7px;font-size:.88rem;font-family:'Hind Siliguri',sans-serif;font-weight:600;transition:.2s;}
    .cart-btn:hover{background:var(--teak-dark);}
    .cart-count{background:var(--gold);color:var(--charcoal);border-radius:50%;width:20px;height:20px;font-size:.7rem;font-weight:700;display:flex;align-items:center;justify-content:center;}

    .hamburger{display:none;background:none;border:2px solid var(--teak);color:var(--teak);padding:7px 10px;border-radius:7px;cursor:pointer;font-size:1.1rem;}

    /* ── MOBILE NAV ── */
    .mobile-nav{display:none;background:#fff;border-top:1px solid var(--light-gray);padding:16px 24px;flex-direction:column;gap:6px;}
    .mobile-nav a{text-decoration:none;color:var(--charcoal);padding:10px 14px;border-radius:7px;font-weight:500;display:block;}
    .mobile-nav a:hover{background:var(--cream);}
    .mobile-nav.open{display:flex;}

    /* ── HERO ── */
    .hero{background:var(--hero-bg);color:#fff;padding:80px 24px 60px;position:relative;overflow:hidden;min-height:520px;display:flex;align-items:center;}
    .hero::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23D4A017' fill-opacity='0.06'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");}
    .hero-inner{max-width:1280px;margin:auto;display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:center;position:relative;}
    .hero-badge{display:inline-block;background:var(--gold);color:var(--charcoal);font-size:.75rem;font-weight:700;padding:5px 14px;border-radius:20px;margin-bottom:16px;letter-spacing:.06em;text-transform:uppercase;}
    .hero h1{font-family:'Playfair Display',serif;font-size:clamp(2rem,4vw,3.2rem);font-weight:900;line-height:1.2;margin-bottom:16px;}
    .hero h1 span{color:var(--gold-light);}
    .hero p{font-size:1.05rem;color:rgba(255,255,255,.82);line-height:1.7;margin-bottom:28px;}
    .hero-btns{display:flex;gap:12px;flex-wrap:wrap;}
    .btn-primary{background:var(--gold);color:var(--charcoal);padding:13px 28px;border-radius:8px;font-weight:700;text-decoration:none;font-size:.95rem;transition:.2s;display:inline-flex;align-items:center;gap:8px;border:none;cursor:pointer;font-family:'Hind Siliguri',sans-serif;}
    .btn-primary:hover{background:var(--gold-light);transform:translateY(-2px);}
    .btn-outline{background:transparent;color:#fff;padding:13px 28px;border-radius:8px;font-weight:600;text-decoration:none;font-size:.95rem;border:2px solid rgba(255,255,255,.4);transition:.2s;display:inline-flex;align-items:center;gap:8px;cursor:pointer;font-family:'Hind Siliguri',sans-serif;}
    .btn-outline:hover{border-color:#fff;background:rgba(255,255,255,.08);}
    .hero-img-wrap{display:flex;justify-content:center;align-items:center;}
    .hero-img-wrap img{width:100%;max-width:440px;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.45);border:3px solid var(--gold);object-fit:cover;}
    .hero-stats{display:flex;gap:28px;margin-top:32px;flex-wrap:wrap;}
    .stat{text-align:center;}
    .stat .num{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:900;color:var(--gold-light);}
    .stat .lbl{font-size:.75rem;color:rgba(255,255,255,.65);margin-top:2px;}

    /* ── CUSTOM ORDER BANNER ── */
    .custom-banner{background:linear-gradient(135deg,var(--gold) 0%,#C68642 100%);padding:28px 24px;text-align:center;}
    .custom-banner-inner{max-width:800px;margin:auto;}
    .custom-banner h2{font-family:'Playfair Display',serif;font-size:1.5rem;color:var(--charcoal);margin-bottom:8px;}
    .custom-banner p{color:var(--teak-dark);margin-bottom:16px;font-size:.95rem;}
    .custom-banner .btn-primary{background:var(--teak-dark);color:#fff;}
    .custom-banner .btn-primary:hover{background:var(--charcoal);}

    /* ── SECTION HEADER ── */
    .section-header{text-align:center;margin-bottom:40px;}
    .section-header .tag{font-size:.75rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--teak);margin-bottom:8px;display:block;}
    .section-header h2{font-family:'Playfair Display',serif;font-size:clamp(1.6rem,3vw,2.4rem);font-weight:900;color:var(--teak-dark);}
    .section-header p{color:var(--gray);margin-top:10px;font-size:.95rem;}
    .divider{width:60px;height:3px;background:linear-gradient(90deg,var(--gold),var(--teak-light));margin:14px auto 0;border-radius:2px;}

    /* ── PRODUCTS ── */
    #products{padding:72px 24px;background:var(--warm-white);}
    .products-inner{max-width:1280px;margin:auto;}
    .filter-bar{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:36px;}
    .filter-btn{padding:8px 20px;border-radius:24px;border:1.5px solid var(--light-gray);background:#fff;color:var(--gray);font-size:.84rem;cursor:pointer;font-family:'Hind Siliguri',sans-serif;font-weight:500;transition:.2s;}
    .filter-btn.active,.filter-btn:hover{background:var(--teak);color:#fff;border-color:var(--teak);}
    .product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:24px;}
    .product-card{background:#fff;border-radius:14px;overflow:hidden;box-shadow:var(--card-shadow);transition:.25s;cursor:pointer;position:relative;}
    .product-card:hover{transform:translateY(-6px);box-shadow:0 16px 48px rgba(92,46,10,.24);}
    .product-card .badge{position:absolute;top:12px;left:12px;background:var(--teak);color:#fff;font-size:.7rem;font-weight:700;padding:4px 10px;border-radius:12px;z-index:2;}
    .product-card img{width:100%;height:220px;object-fit:cover;display:block;transition:.3s;}
    .product-card:hover img{transform:scale(1.04);}
    .product-card .img-wrap{overflow:hidden;position:relative;}
    .product-card .overlay{position:absolute;inset:0;background:rgba(92,46,10,.6);opacity:0;display:flex;align-items:center;justify-content:center;gap:10px;transition:.25s;}
    .product-card:hover .overlay{opacity:1;}
    .overlay-btn{background:#fff;color:var(--teak);border:none;padding:9px 16px;border-radius:7px;font-size:.82rem;font-weight:600;cursor:pointer;font-family:'Hind Siliguri',sans-serif;transition:.2s;}
    .overlay-btn:hover{background:var(--gold);}
    .product-card .info{padding:16px;}
    .product-card .name{font-weight:700;font-size:1rem;color:var(--teak-dark);margin-bottom:4px;}
    .product-card .material{font-size:.78rem;color:var(--gray);margin-bottom:10px;}
    .product-card .price-row{display:flex;align-items:center;justify-content:space-between;}
    .product-card .price{font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:700;color:var(--teak);}
    .add-cart{background:var(--teak);color:#fff;border:none;padding:8px 14px;border-radius:7px;font-size:.8rem;cursor:pointer;font-family:'Hind Siliguri',sans-serif;font-weight:600;transition:.2s;}
    .add-cart:hover{background:var(--teak-dark);}

    /* ── WHY US ── */
    #why{padding:72px 24px;background:var(--cream);}
    .why-inner{max-width:1100px;margin:auto;}
    .why-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:24px;margin-top:40px;}
    .why-card{background:#fff;border-radius:14px;padding:28px 22px;text-align:center;box-shadow:0 4px 18px rgba(92,46,10,.08);border-top:4px solid var(--gold);}
    .why-icon{font-size:2rem;margin-bottom:14px;}
    .why-card h3{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--teak-dark);margin-bottom:8px;}
    .why-card p{font-size:.85rem;color:var(--gray);line-height:1.6;}

    /* ── ABOUT ── */
    #about{padding:72px 24px;background:var(--teak-dark);}
    .about-inner{max-width:1100px;margin:auto;display:grid;grid-template-columns:1fr 1fr;gap:56px;align-items:center;}
    .about-text .tag{color:var(--gold-light);font-size:.75rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;display:block;margin-bottom:10px;}
    .about-text h2{font-family:'Playfair Display',serif;font-size:clamp(1.6rem,2.8vw,2.2rem);color:#fff;margin-bottom:18px;}
    .about-text p{color:rgba(255,255,255,.78);line-height:1.8;font-size:.95rem;margin-bottom:14px;}
    .about-text ul{list-style:none;display:flex;flex-direction:column;gap:10px;margin-top:4px;}
    .about-text ul li{color:rgba(255,255,255,.85);font-size:.9rem;display:flex;align-items:center;gap:10px;}
    .about-text ul li::before{content:'✦';color:var(--gold);font-size:.75rem;}
    .about-img{border-radius:16px;overflow:hidden;box-shadow:0 16px 48px rgba(0,0,0,.4);border:3px solid var(--gold);}
    .about-img img{width:100%;display:block;height:360px;object-fit:cover;}

    /* ── TESTIMONIALS ── */
    #reviews{padding:72px 24px;background:var(--warm-white);}
    .reviews-inner{max-width:1100px;margin:auto;}
    .review-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:22px;margin-top:40px;}
    .review-card{background:#fff;border-radius:14px;padding:24px;box-shadow:0 4px 18px rgba(92,46,10,.08);border-left:4px solid var(--gold);}
    .stars{color:var(--gold);font-size:1rem;margin-bottom:10px;}
    .review-card p{font-size:.88rem;color:var(--gray);line-height:1.7;margin-bottom:14px;}
    .reviewer{font-weight:700;color:var(--teak-dark);font-size:.85rem;}

    /* ── CONTACT ── */
    #contact{padding:72px 24px;background:linear-gradient(135deg,#1C0A02 0%,#3B1A06 100%);}
    .contact-inner{max-width:1000px;margin:auto;display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:start;}
    .contact-info .tag{color:var(--gold-light);font-size:.75rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;display:block;margin-bottom:10px;}
    .contact-info h2{font-family:'Playfair Display',serif;font-size:1.9rem;color:#fff;margin-bottom:20px;}
    .contact-item{display:flex;align-items:flex-start;gap:14px;margin-bottom:18px;}
    .contact-icon{font-size:1.3rem;color:var(--gold);margin-top:2px;flex-shrink:0;}
    .contact-item h4{color:#fff;font-size:.9rem;font-weight:600;margin-bottom:3px;}
    .contact-item p,.contact-item a{color:rgba(255,255,255,.72);font-size:.87rem;text-decoration:none;}
    .contact-item a:hover{color:var(--gold-light);}
    .social-links{display:flex;gap:12px;margin-top:24px;flex-wrap:wrap;}
    .social-btn{display:flex;align-items:center;gap:8px;padding:11px 20px;border-radius:9px;font-size:.85rem;font-weight:600;text-decoration:none;transition:.2s;font-family:'Hind Siliguri',sans-serif;}
    .social-btn.fb{background:#1877F2;color:#fff;}
    .social-btn.fb:hover{background:#1557C0;}
    .social-btn.msg{background:linear-gradient(135deg,#0084FF,#A033FF);color:#fff;}
    .social-btn.msg:hover{opacity:.9;}
    .order-form{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:32px;}
    .order-form h3{font-family:'Playfair Display',serif;font-size:1.3rem;color:#fff;margin-bottom:20px;}
    .form-group{margin-bottom:16px;}
    .form-group label{display:block;color:rgba(255,255,255,.8);font-size:.83rem;margin-bottom:6px;font-weight:500;}
    .form-group input,.form-group select,.form-group textarea{width:100%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;padding:11px 14px;border-radius:8px;font-size:.88rem;font-family:'Hind Siliguri',sans-serif;outline:none;transition:.2s;}
    .form-group input::placeholder,.form-group textarea::placeholder{color:rgba(255,255,255,.4);}
    .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--gold);background:rgba(255,255,255,.14);}
    .form-group select option{background:#3B1A06;color:#fff;}
    .form-group textarea{resize:vertical;min-height:90px;}
    .order-btn{width:100%;background:var(--gold);color:var(--charcoal);padding:13px;border:none;border-radius:9px;font-size:.95rem;font-weight:700;cursor:pointer;font-family:'Hind Siliguri',sans-serif;transition:.2s;margin-top:6px;}
    .order-btn:hover{background:var(--gold-light);transform:translateY(-1px);}

    /* ── FOOTER ── */
    footer{background:#0D0600;color:rgba(255,255,255,.65);padding:48px 24px 24px;}
    .footer-inner{max-width:1280px;margin:auto;}
    .footer-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:40px;margin-bottom:36px;}
    .footer-brand .brand-name{font-family:'Playfair Display',serif;font-size:1.3rem;color:#fff;font-weight:900;}
    .footer-brand .brand-sub{font-size:.75rem;color:var(--gold);letter-spacing:.06em;text-transform:uppercase;margin-top:3px;}
    .footer-brand p{font-size:.83rem;line-height:1.7;margin-top:14px;}
    .footer-col h4{color:#fff;font-size:.88rem;font-weight:700;margin-bottom:14px;letter-spacing:.04em;}
    .footer-col ul{list-style:none;display:flex;flex-direction:column;gap:8px;}
    .footer-col ul li a{color:rgba(255,255,255,.6);text-decoration:none;font-size:.82rem;transition:.2s;}
    .footer-col ul li a:hover{color:var(--gold-light);}
    .footer-bottom{border-top:1px solid rgba(255,255,255,.08);padding-top:20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:gap;gap:10px;}
    .footer-bottom p{font-size:.78rem;}
    .footer-bottom a{color:var(--gold);text-decoration:none;}

    /* ── PRODUCT MODAL ── */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:9999;align-items:center;justify-content:center;padding:20px;}
    .modal-overlay.open{display:flex;}
    .modal{background:#fff;border-radius:18px;max-width:700px;width:100%;max-height:90vh;overflow-y:auto;position:relative;}
    .modal-close{position:absolute;top:14px;right:18px;background:none;border:none;font-size:1.6rem;cursor:pointer;color:var(--gray);z-index:10;}
    .modal img{width:100%;height:320px;object-fit:cover;border-radius:18px 18px 0 0;}
    .modal-body{padding:24px;}
    .modal-body h2{font-family:'Playfair Display',serif;font-size:1.6rem;color:var(--teak-dark);margin-bottom:6px;}
    .modal-body .modal-price{font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--teak);font-weight:700;margin-bottom:14px;}
    .modal-body p{color:var(--gray);font-size:.9rem;line-height:1.7;margin-bottom:18px;}
    .modal-actions{display:flex;gap:12px;flex-wrap:wrap;}
    .modal-actions .btn-primary,.modal-actions .btn-outline{flex:1;justify-content:center;}
    .modal-actions .btn-outline{color:var(--teak);border-color:var(--teak);}

    /* ── CART DRAWER ── */
    .cart-drawer{position:fixed;right:-380px;top:0;width:370px;max-width:95vw;height:100vh;background:#fff;z-index:9998;box-shadow:-8px 0 40px rgba(0,0,0,.2);transition:.35s ease;display:flex;flex-direction:column;}
    .cart-drawer.open{right:0;}
    .cart-header{background:var(--teak-dark);color:#fff;padding:18px 20px;display:flex;align-items:center;justify-content:space-between;}
    .cart-header h3{font-family:'Playfair Display',serif;font-size:1.15rem;}
    .cart-close-btn{background:none;border:none;color:#fff;font-size:1.4rem;cursor:pointer;}
    .cart-items{flex:1;overflow-y:auto;padding:16px;}
    .cart-empty{text-align:center;padding:40px 20px;color:var(--gray);}
    .cart-empty .icon{font-size:3rem;margin-bottom:12px;}
    .cart-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--light-gray);}
    .cart-item img{width:64px;height:64px;object-fit:cover;border-radius:8px;flex-shrink:0;}
    .cart-item-info{flex:1;}
    .cart-item-info .ci-name{font-weight:600;font-size:.88rem;color:var(--teak-dark);}
    .cart-item-info .ci-price{color:var(--teak);font-weight:700;font-size:.9rem;margin-top:3px;}
    .cart-item-remove{background:none;border:none;color:#ccc;cursor:pointer;font-size:1.1rem;align-self:flex-start;padding:2px 6px;}
    .cart-item-remove:hover{color:red;}
    .cart-footer{padding:16px;border-top:2px solid var(--light-gray);}
    .cart-total{display:flex;justify-content:space-between;font-size:1.05rem;font-weight:700;color:var(--teak-dark);margin-bottom:14px;font-family:'Playfair Display',serif;}
    .checkout-btn{width:100%;background:var(--teak);color:#fff;padding:13px;border:none;border-radius:9px;font-size:.95rem;font-weight:700;cursor:pointer;font-family:'Hind Siliguri',sans-serif;}
    .checkout-btn:hover{background:var(--teak-dark);}

    /* ── TOAST ── */
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--teak-dark);color:#fff;padding:12px 24px;border-radius:10px;font-size:.88rem;font-weight:600;z-index:99999;transition:.3s;opacity:0;pointer-events:none;white-space:nowrap;}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

    /* ── BACK TO TOP ── */
    .back-top{position:fixed;bottom:24px;right:24px;background:var(--teak);color:#fff;border:none;width:44px;height:44px;border-radius:50%;font-size:1.1re
